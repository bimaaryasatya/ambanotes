name: ambanotes
description: AI-powered document management and secretariat dashboard.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  get: ^4.6.6
  lucide_icons: 0.257.0
  google_fonts: ^6.2.1
  flutter_staggered_animations: ^1.0.0
  image_picker: ^1.0.7
  file_picker: ^8.0.0
  intl: ^0.19.0
  url_launcher: ^6.3.2
  get_storage: ^2.1.1
  flutter_markdown: ^0.7.7+1
  share_plus: ^12.0.2
  path_provider: ^2.1.5
  flutter_local_notifications: ^21.0.0
  flutter_tts: ^4.2.5
  tflite_flutter: ^0.12.1
  camera: ^0.10.5+9
  image: ^4.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/ml/
